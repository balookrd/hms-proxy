# -----------------------------------------------------------------------------
# Listener
# -----------------------------------------------------------------------------
# HMS proxy listener
server.name=hms-proxy
server.bind-host=0.0.0.0
server.port=9083
server.min-worker-threads=32
server.max-worker-threads=512

# Optional management listener for Prometheus metrics and health/readiness probes.
# Enabled automatically when management.port is set, or explicitly via management.enabled=true.
# management.enabled=true
# management.bind-host=0.0.0.0
# management.port=19083

# -----------------------------------------------------------------------------
# Routing
# -----------------------------------------------------------------------------
# When several catalogs are configured, routing.default-catalog is used for
# legacy requests that do not specify catalog + separator + db explicitly.
routing.default-catalog=catalog1

# Optional separator for legacy database names like catalog1__sales.
# "__" is usually easier to use from Beeline/HS2 than ".".
routing.catalog-db-separator=__

# Optional backend latency tuning. Disabled by default so existing behavior stays unchanged.
# When enabled, the proxy keeps per-catalog latency EWMA, adapts backend socket timeouts,
# opens a circuit after repeated transport/time-budget failures, and can run safe read-only
# fanout RPCs in parallel with degraded omission of slow/unavailable catalogs.
# routing.backend-state-polling.enabled=true
# routing.backend-state-polling.interval-ms=10000
# routing.adaptive-timeout.enabled=true
# routing.adaptive-timeout.initial-ms=5000
# routing.adaptive-timeout.min-ms=1000
# routing.adaptive-timeout.max-ms=60000
# routing.adaptive-timeout.multiplier=4.0
# routing.adaptive-timeout.alpha=0.2
# routing.circuit-breaker.enabled=true
# routing.circuit-breaker.failure-threshold=3
# routing.circuit-breaker.open-state-ms=30000
# routing.hedged-read.enabled=true
# routing.hedged-read.max-parallelism=8
# routing.degraded-routing-policy=SAFE_FANOUT_READS

# -----------------------------------------------------------------------------
# Compatibility and federation
# -----------------------------------------------------------------------------
# Optional Hive compatibility mode: keep backend catName/catalogName such as "hive"
# in externalized HMS objects while dbName still uses the proxy namespace.
# Apache 3.1.3 frontends can also talk through the proxy to older Hortonworks 3.1.0.x
# backends; the proxy automatically downgrades selected *_req RPCs when needed.
# Optional frontend identity exposed by getVersion(): APACHE_3_1_3 (default),
# HORTONWORKS_3_1_0_3_1_0_78 for HDP 3.1.0.3.1.0.0-78, or
# HORTONWORKS_3_1_0_3_1_5_6150_1 for HDP 3.1.0.3.1.5.6150-1.
compatibility.frontend-profile=APACHE_3_1_3
# Optional: path to Hortonworks standalone-metastore jar used to expose the matching
# HDP thrift frontend interface.
# compatibility.frontend-standalone-metastore-jar=/opt/hms-proxy/hive-metastore/hive-standalone-metastore-3.1.0.3.1.0.0-78.jar
# compatibility.frontend-standalone-metastore-jar=/opt/hms-proxy/hive-metastore/hive-standalone-metastore-3.1.0.3.1.5.6150-1.jar
# Optional: path to standalone-metastore jar used for isolated backend runtimes such as Hortonworks.
# compatibility.backend-standalone-metastore-jar=/opt/hms-proxy/hive-metastore/hive-standalone-metastore-3.1.0.3.1.0.0-78.jar
# compatibility.backend-standalone-metastore-jar=/opt/hms-proxy/hive-metastore/hive-standalone-metastore-3.1.0.3.1.5.6150-1.jar
# Optional: override backend runtime and jar per catalog in mixed deployments.
# catalog.catalog1.runtime-profile=HORTONWORKS_3_1_0_3_1_0_78
# catalog.catalog1.backend-standalone-metastore-jar=/opt/hms-proxy/hive-metastore/hive-standalone-metastore-3.1.0.3.1.0.0-78.jar
# catalog.catalog1.runtime-profile=HORTONWORKS_3_1_0_3_1_5_6150_1
# catalog.catalog1.backend-standalone-metastore-jar=/opt/hms-proxy/hive-metastore/hive-standalone-metastore-3.1.0.3.1.5.6150-1.jar
federation.preserve-backend-catalog-name=false

# Optional: rewrite db.table references inside Hive view / materialized-view SQL text.
# This is a conservative, parser-less rewrite for viewExpandedText and, unless preserved,
# viewOriginalText as well.
# federation.view-text-rewrite.mode=rewrite
# federation.view-text-rewrite.preserve-original-text=true

# -----------------------------------------------------------------------------
# Transactional DDL guard
# -----------------------------------------------------------------------------
# Optional: protect create_table / alter_table when table params contain
# transactional=true or any transactional_properties value on MANAGED_TABLE only.
# guard.transactional-ddl.mode=reject  -> reject the request
# guard.transactional-ddl.mode=rewrite -> rewrite to EXTERNAL_TABLE,
#   add external.table.purge=true, and remove transactional metadata
# If guard.transactional-ddl.client-addresses is omitted, the rule is applied to all clients.
# Otherwise it is applied only for the listed client IPs/CIDRs.
# guard.transactional-ddl.mode=reject
# guard.transactional-ddl.client-addresses=10.10.0.15,10.20.0.0/16,2001:db8::/64

# -----------------------------------------------------------------------------
# Rate limiting / overload protection
# -----------------------------------------------------------------------------
# Optional token-bucket overload protection. Limits are independent: a request
# must pass every configured bucket that applies to it.
# requests-per-second is the steady refill rate; burst defaults to the same
# value when omitted.
#
# Per authenticated client principal (for Kerberos/SASL front doors):
# rate-limit.principal.requests-per-second=40
# rate-limit.principal.burst=80
#
# Per exact source IP:
# rate-limit.source.requests-per-second=25
# rate-limit.source.burst=50
#
# Aggregate per source CIDR/rule. Useful when bad clients fan out across many IPs.
# Multiple matching CIDR rules are all enforced.
# rate-limit.source-cidr.hs2-pool.cidrs=10.10.0.0/16,10.20.0.0/16
# rate-limit.source-cidr.hs2-pool.requests-per-second=200
# rate-limit.source-cidr.hs2-pool.burst=300
#
# Per HMS method family. Supported families:
# metadata_read, metadata_write, service_global_read, service_global_write,
# acid_namespace_bound_write, acid_id_bound_lifecycle, admin_introspection,
# compatibility_only_rpc
# rate-limit.method-family.metadata_read.requests-per-second=400
# rate-limit.method-family.metadata_read.burst=800
#
# Per logical catalog:
# rate-limit.catalog.catalog1.requests-per-second=250
# rate-limit.catalog.catalog1.burst=500
# rate-limit.catalog.catalog2.requests-per-second=120
#
# Separate high-risk RPC classes. A request can match several at once, for
# example lock RPCs also count toward write/txn when applicable.
# Supported classes: write, ddl, txn, lock
# rate-limit.rpc-class.write.requests-per-second=80
# rate-limit.rpc-class.ddl.requests-per-second=20
# rate-limit.rpc-class.txn.requests-per-second=40
# rate-limit.rpc-class.lock.requests-per-second=60
#
# Example production profile:
# rate-limit.principal.requests-per-second=60
# rate-limit.source.requests-per-second=30
# rate-limit.method-family.metadata_read.requests-per-second=600
# rate-limit.catalog.catalog1.requests-per-second=300
# rate-limit.rpc-class.ddl.requests-per-second=15
# rate-limit.rpc-class.txn.requests-per-second=30
# rate-limit.rpc-class.lock.requests-per-second=50

# -----------------------------------------------------------------------------
# Front-door security
# -----------------------------------------------------------------------------
# Server-side security: NONE or KERBEROS
security.mode=KERBEROS
security.server-principal=hive/_HOST@EXAMPLE.COM
security.client-principal=hive/_HOST@EXAMPLE.COM
security.keytab=/etc/security/keytabs/hms-proxy.keytab
# Default for all backends. Can be overridden per catalog below.
security.impersonation-enabled=false
# Optional: dedicated keytab for proxy -> backend HMS connections.
# Defaults to security.keytab when omitted.
security.client-keytab=/etc/security/keytabs/hms-proxy-client.keytab

# -----------------------------------------------------------------------------
# Delegation tokens and front-door HiveConf overrides
# -----------------------------------------------------------------------------
# Optional: front-door HiveConf overrides for the local delegation-token manager.
# Useful when your launch script does not put hive-site.xml on the proxy classpath.
# security.front-door-conf.hive.cluster.delegation.token.store.class=org.apache.hadoop.hive.metastore.security.ZooKeeperTokenStore
# security.front-door-conf.hive.cluster.delegation.token.store.zookeeper.connectString=zk1:2181,zk2:2181,zk3:2181
# security.front-door-conf.hive.cluster.delegation.token.store.zookeeper.znode=/hms-proxy-delegation-tokens
# Optional: ACL for new znode paths created by the token store.
# security.front-door-conf.hive.cluster.delegation.token.store.zookeeper.acl=sasl:hive:cdrwa
# Optional: delegation-token max lifetime in milliseconds.
# security.front-door-conf.hive.cluster.delegation.token.max-lifetime=604800000
# When security.mode=KERBEROS, ZooKeeperTokenStore uses the front-door credentials
# security.server-principal and security.keytab for SASL/Kerberos to ZooKeeper by default.
# It does not use security.client-principal/security.client-keytab, which are for backend HMS.
# Override these explicitly if ZooKeeper should use different credentials:
# security.front-door-conf.hive.metastore.kerberos.principal=hive/_HOST@EXAMPLE.COM
# security.front-door-conf.hive.metastore.kerberos.keytab.file=/etc/security/keytabs/hms-proxy.keytab
# If HiveServer2 connects as hive/_HOST and requests end-user delegation tokens,
# allow it on the proxy front door as well:
# security.front-door-conf.hadoop.proxyuser.hive.hosts=hs2-a.internal,hs2-b.internal
# security.front-door-conf.hadoop.proxyuser.hive.groups=*

# -----------------------------------------------------------------------------
# Synthetic read-lock store
# -----------------------------------------------------------------------------
# Optional: persistent store for the proxy's synthetic non-ACID read-lock shim.
# This keeps synthetic lock state shared between multiple proxy instances so
# HS2 lock/check_lock/heartbeat/unlock/commit/abort can continue through a neighbor
# if the first proxy dies. Default is IN_MEMORY for single-instance setups.
# This is not a distributed ACID coordinator: it only persists the proxy's
# synthetic SHARED_READ SELECT locks for non-default catalogs.
# synthetic-read-lock.store.mode=ZOOKEEPER
# synthetic-read-lock.store.zookeeper.connect-string=zk1:2181,zk2:2181,zk3:2181
# synthetic-read-lock.store.zookeeper.znode=/hms-proxy-synthetic-read-locks
# synthetic-read-lock.store.zookeeper.connection-timeout-ms=15000
# synthetic-read-lock.store.zookeeper.session-timeout-ms=60000
# synthetic-read-lock.store.zookeeper.base-sleep-ms=1000
# synthetic-read-lock.store.zookeeper.max-retries=3
# When security.mode=KERBEROS, the synthetic read-lock store uses
# security.server-principal and security.keytab for ZooKeeper SASL/Kerberos.

# -----------------------------------------------------------------------------
# Shared backend defaults
# -----------------------------------------------------------------------------
# Optional: shared HiveConf for all outbound backend thrift clients.
# Any catalog.catalogX.conf.* setting below overrides the shared backend value.
# backend.conf.hive.metastore.client.socket.timeout=45s
# backend.conf.hive.metastore.execute.setugi=true

# -----------------------------------------------------------------------------
# Catalogs
# -----------------------------------------------------------------------------
catalogs=catalog1,catalog2

# Catalog 1
catalog.catalog1.description=Primary warehouse
catalog.catalog1.location-uri=s3a://warehouse-a/
catalog.catalog1.impersonation-enabled=true
# Optional per-catalog write policy:
# READ_WRITE (default), READ_ONLY, READ_WRITE_DB_WHITELIST
# catalog.catalog1.access-mode=READ_WRITE_DB_WHITELIST
# catalog.catalog1.write-db-whitelist=sales,analytics
# Optional selective federation exposure for metadata reads:
# expose-mode defaults to ALLOW_ALL for backward compatibility.
# Set DENY_BY_DEFAULT to publish only namespaces matched by the regex allowlists below.
# Regexes are matched case-insensitively against backend db/table names inside this catalog.
# catalog.catalog1.expose-mode=DENY_BY_DEFAULT
# catalog.catalog1.expose-db-patterns=sales,finance_.*
# catalog.catalog1.expose-table-patterns.sales=orders_.*,events
# catalog.catalog1.expose-table-patterns.finance_.*=audit_.*
# Optional per-catalog extra latency budget in milliseconds. Useful for slower metastores
# so adaptive timeouts and degraded fanout omission become less aggressive.
# catalog.catalog1.latency-budget-ms=750
catalog.catalog1.conf.hive.metastore.uris=thrift://hms-a.internal:9083
catalog.catalog1.conf.hive.metastore.sasl.enabled=true
catalog.catalog1.conf.hive.metastore.kerberos.principal=hive/_HOST@EXAMPLE.COM

# Catalog 2
catalog.catalog2.description=Cold archive warehouse
catalog.catalog2.location-uri=abfs://archive@storage.dfs.core.windows.net/warehouse/
catalog.catalog2.impersonation-enabled=false
# catalog.catalog2.latency-budget-ms=2500
catalog.catalog2.conf.hive.metastore.uris=thrift://hms-b.internal:9083
catalog.catalog2.conf.hive.metastore.sasl.enabled=true
catalog.catalog2.conf.hive.metastore.kerberos.principal=hive/_HOST@EXAMPLE.COM
