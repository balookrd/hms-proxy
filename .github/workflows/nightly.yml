name: Nightly Release

on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: nightly-${{ github.workflow }}-${{ github.event_name }}-${{ github.ref_name || github.run_id }}
  cancel-in-progress: true

jobs:
  build-release:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Check out sources
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Resolve project version
        id: version
        run: echo "project_version=$(mvn -q -DforceStdout help:evaluate -Dexpression=project.version)" >> "$GITHUB_OUTPUT"

      - name: Run unit tests
        run: mvn -B test

      - name: Build jars
        run: mvn -B -DskipTests package

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: hms-proxy-${{ steps.version.outputs.project_version }}
          path: |
            target/*.jar
          if-no-files-found: error

      - name: Compute release metadata
        id: release
        env:
          PROJECT_VERSION: ${{ steps.version.outputs.project_version }}
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "push" ]]; then
            tag_name="build-${PROJECT_VERSION}"
            release_name="Build ${PROJECT_VERSION}"
            release_body="Automated CI build for commit ${GITHUB_SHA} on ${GITHUB_REF_NAME}."
          else
            nightly_date="$(date -u +%Y-%m-%d)"
            nightly_stamp="$(date -u +%Y%m%d)"
            tag_name="nightly-${nightly_stamp}"
            release_name="Nightly ${nightly_date}"
            release_body="Automated nightly CI build from commit ${GITHUB_SHA}."
          fi

          {
            echo "tag_name=${tag_name}"
            echo "release_name=${release_name}"
            echo "release_body=${release_body}"
          } >> "$GITHUB_OUTPUT"

      - name: Publish prerelease
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release.outputs.tag_name }}
          target_commitish: ${{ github.sha }}
          name: ${{ steps.release.outputs.release_name }}
          body: ${{ steps.release.outputs.release_body }}
          prerelease: true
          make_latest: false
          draft: false
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            target/*.jar

      - name: Prune old nightly releases
        if: startsWith(steps.release.outputs.tag_name, 'nightly-')
        uses: actions/github-script@v7
        with:
          script: |
            const keep = 14;
            const { owner, repo } = context.repo;
            const releases = await github.paginate(github.rest.repos.listReleases, {
              owner,
              repo,
              per_page: 100
            });

            const nightlyReleases = releases
              .filter((release) => release.tag_name && release.tag_name.startsWith("nightly-"))
              .sort((left, right) => new Date(right.created_at) - new Date(left.created_at));

            const releasesToDelete = nightlyReleases.slice(keep);

            for (const release of releasesToDelete) {
              core.info(`Deleting old nightly release ${release.tag_name}`);
              await github.rest.repos.deleteRelease({
                owner,
                repo,
                release_id: release.id
              });

              try {
                await github.rest.git.deleteRef({
                  owner,
                  repo,
                  ref: `tags/${release.tag_name}`
                });
              } catch (error) {
                if (error.status === 404) {
                  core.info(`Tag ${release.tag_name} already removed`);
                } else {
                  throw error;
                }
              }
            }
